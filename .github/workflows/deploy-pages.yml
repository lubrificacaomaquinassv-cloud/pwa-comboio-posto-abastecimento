# Publica a pasta app/ no GitHub Pages (HTTPS).
# Apos o primeiro push: Repo > Settings > Pages > Build: GitHub Actions.
name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          # Primeira execucao: tenta habilitar Pages + build via Actions (evita HttpError Not Found)
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
