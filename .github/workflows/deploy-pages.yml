# Publica o PWA no GitHub Pages (HTTPS).
# Pasta do front: "app" OU "Aplicativo" (GitHub em portugues as vezes renomeia).
# Branch: main, master ou Principal (padrao em alguns repos PT-BR).
name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - Principal
    paths:
      - "app/**"
      - "Aplicativo/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Preparar pasta do site (app ou Aplicativo)
        run: |
          rm -rf _site
          if [ -d app ]; then
            cp -a app _site
            echo "Usando pasta: app"
          elif [ -d Aplicativo ]; then
            cp -a Aplicativo _site
            echo "Usando pasta: Aplicativo"
          else
            echo "ERRO: nem app/ nem Aplicativo/ encontrados."
            ls -la
            exit 1
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
