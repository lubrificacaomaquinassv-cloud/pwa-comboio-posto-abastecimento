# Publica o PWA na branch gh-pages (metodo classico).
# NAO usa configure-pages/deploy-pages da API do GitHub — evita HttpError Not Found
# em organizacoes onde o token nao habilita Pages via Actions.
#
# Apos o primeiro deploy verde: Repo > Settings > Pages >
#   Origem: "Implantar de um branch" / Deploy from a branch
#   Branch: gh-pages   Pasta: / (root)
#
# Pasta do front no repo: "app" OU "Aplicativo"
name: Deploy PWA (branch gh-pages)

on:
  push:
    branches:
      - main
      - master
      - Principal
    paths:
      - "app/**"
      - "Aplicativo/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar pasta do site (app ou Aplicativo)
        run: |
          rm -rf _site
          if [ -d app ]; then
            cp -a app _site
            echo "Usando pasta: app"
          elif [ -d Aplicativo ]; then
            cp -a Aplicativo _site
            echo "Usando pasta: Aplicativo"
          else
            echo "ERRO: nem app/ nem Aplicativo/ encontrados."
            ls -la
            exit 1
          fi

      - name: Publicar em gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
          force_orphan: true
