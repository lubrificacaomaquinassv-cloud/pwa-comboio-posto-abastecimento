<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lubrificação - Santa Vergínia</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28a745">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Lubrificação SV">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 450px; margin: auto; background: #f0f2f5; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    .logo { max-width: 220px; height: auto; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
    h3 { margin: 0 0 20px 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-top: 12px; text-align: left; }
    input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    .row { display: flex; gap: 8px; }
    .row input, .row select { width: 50%; }
    button { background: #28a745; color: white; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; border-radius: 6px; }
    button:hover { background: #218838; }
    button:disabled { background: #ccc; }
    #status-bar { padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-align: center; }
    .online  { background: #d4edda; color: #155724; }
    .offline { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
<div class="card">
  <img src="https://i.postimg.cc/Y9X7ddnb/LOGO-BP.jpg" alt="Logo Santa Vergínia" class="logo">
  <h3>Registro de Lubrificação</h3>

  <div id="status-bar" class="offline">⏳ Verificando conexão...</div>

  <form id="form">
    <label>Equipamentos</label>
    <select id="frota" required>
      <option value="">Carregando...</option>
    </select>

    <label>Tipo e Motivo</label>
    <div class="row">
      <select id="tipo_servico" required>
        <option value="LUBRIFICACAO">GRAXA</option>
        <option value="OLEO">ÓLEO</option>
        <option value="FILTRO">FILTRO</option>
      </select>
      <select id="motivo" required>
        <option value="PREVENTIVA">PREVENTIVA</option>
        <option value="VAZAMENTO">VAZAMENTO</option>
        <option value="CORRETIVA">CORRETIVA</option>
      </select>
    </div>

    <label>Lubrificante / Filtro</label>
    <select id="lubrificante" required>
      <option value="">Carregando...</option>
    </select>

    <label>Operador e Local</label>
    <input type="text" id="responsavel" placeholder="Responsável" required>
    <input type="text" id="local" placeholder="Local de Trabalho">

    <label>Item (Serviço Específico)</label>
    <input type="text" id="servico" placeholder="Ex: Motor, Pinos, Cubo" required>

    <label>Qtd e Valor Unitário</label>
    <div class="row">
      <input type="number" id="qtd" placeholder="Qtd" step="0.01">
      <input type="number" id="valor" placeholder="R$ Unit" step="0.01">
    </div>

    <label>Horímetro / KM</label>
    <div class="row">
      <input type="number" id="atual" placeholder="Atual">
      <input type="number" id="anterior" placeholder="Anterior">
    </div>

    <label>Próxima Troca</label>
    <input type="text" id="proxima" placeholder="Ex: 5500h ou 20/06/2026">

    <button type="submit" id="btn">SALVAR</button>
  </form>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOA8Uo9HtQDOyWn7lii6eExsqaFdNK5iKN7_HOWtyhz_9xaPMue0qDxnZjgFRRgYMr/exec";

  const DB_NAME    = "lubrificacao_sv_offline";
  const STORE_NAME = "fila_envio";
  let db;

  // ── IndexedDB ─────────────────────────────────────────────
  function abrirDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id" });
      req.onsuccess = e => { db = e.target.result; resolve(db); };
      req.onerror   = e => reject(e);
    });
  }
  function salvarNaFila(d) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).add(d).onsuccess = resolve;
      tx.onerror = reject;
    });
  }
  function contarFila() {
    return new Promise(resolve => {
      const tx = db.transaction(STORE_NAME, "readonly");
      tx.objectStore(STORE_NAME).count().onsuccess = e => resolve(e.target.result);
    });
  }
  function buscarTodosDaFila() {
    return new Promise(resolve => {
      const tx = db.transaction(STORE_NAME, "readonly");
      tx.objectStore(STORE_NAME).getAll().onsuccess = e => resolve(e.target.result);
    });
  }
  function removerDaFila(id) {
    return new Promise(resolve => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).delete(id).onsuccess = resolve;
    });
  }

  // ── JSONP ─────────────────────────────────────────────────
  function jsonp(action) {
    return new Promise((resolve, reject) => {
      const cb  = "cb_" + Date.now();
      const tag = document.createElement("script");
      tag.src   = APPS_SCRIPT_URL + "?action=" + action + "&callback=" + cb;
      window[cb] = function(data) {
        resolve(data);
        delete window[cb];
        document.body.removeChild(tag);
      };
      tag.onerror = () => {
        reject(new Error("JSONP falhou"));
        delete window[cb];
        document.body.removeChild(tag);
      };
      document.body.appendChild(tag);
    });
  }

  // ── Status ────────────────────────────────────────────────
  async function atualizarStatus() {
    const bar = document.getElementById("status-bar");
    const qtd = await contarFila();
    if (navigator.onLine) {
      bar.className   = "online";
      bar.textContent = "🟢 Online" + (qtd > 0 ? " — " + qtd + " pendente(s) para sincronizar" : " — pronto para salvar");
    } else {
      bar.className   = "offline";
      bar.textContent = "🟡 Offline — salvo no celular" + (qtd > 0 ? " (" + qtd + " pendente(s))" : "");
    }
  }

  // ── Sincronizar fila ──────────────────────────────────────
  async function sincronizarFila() {
    if (!navigator.onLine) return;
    const registros = await buscarTodosDaFila();
    if (registros.length === 0) return;
    try {
      const res  = await fetch(APPS_SCRIPT_URL, {
        method:   "POST",
        redirect: "follow",
        body:     JSON.stringify(registros),
        headers:  { "Content-Type": "text/plain" }
      });
      const json = await res.json();
      if (json.status === "ok") {
        for (const r of registros) await removerDaFila(r.id);
        alert("✅ " + registros.length + " registro(s) sincronizado(s) com a planilha!");
      }
    } catch(err) { console.warn("Erro ao sincronizar:", err); }
    await atualizarStatus();
  }

  // ── Carrega selects via JSONP ─────────────────────────────
  async function carregarListas() {
    await carregarSelect("frota",        "equipamentos",  "equipamentos",  "Selecione o Equipamento", "cache_eq");
    await carregarSelect("lubrificante", "lubrificantes", "lubrificantes", "Selecione o Produto",     "cache_lub");
  }

  async function carregarSelect(idEl, action, chave, placeholder, cacheKey) {
    const sel = document.getElementById(idEl);
    if (navigator.onLine) {
      try {
        const data = await jsonp(action);
        if (data.status === "ok") {
          localStorage.setItem(cacheKey, JSON.stringify(data[chave]));
          preencherSelect(sel, data[chave], placeholder);
          return;
        }
      } catch(e) { console.warn("JSONP erro:", e); }
    }
    const cache = localStorage.getItem(cacheKey);
    if (cache) {
      preencherSelect(sel, JSON.parse(cache), placeholder + " (cache)");
    } else {
      sel.innerHTML = '<option value="">Sem dados — conecte-se uma vez</option>';
    }
  }

  function preencherSelect(sel, lista, placeholder) {
    sel.innerHTML = '<option value="">' + placeholder + '</option>';
    lista.forEach(item => {
      const opt = document.createElement("option");
      if (item.frota !== undefined) {
        opt.value = opt.text = item.frota + " - " + item.descricao;
      } else {
        opt.value = opt.text = item.nome + (item.tipo ? " [" + item.tipo + "]" : "");
      }
      sel.add(opt);
    });
  }

  // ── Submit ────────────────────────────────────────────────
  document.getElementById("form").onsubmit = async function(e) {
    e.preventDefault();
    const btn = document.getElementById("btn");
    btn.disabled    = true;
    btn.textContent = "Salvando...";

    const dados = {
      id:                  "ID-" + Date.now(),
      frota:               document.getElementById("frota").value,
      tipo_servico:        document.getElementById("tipo_servico").value,
      motivo:              document.getElementById("motivo").value,
      lubrificante:        document.getElementById("lubrificante").value,
      responsavel:         document.getElementById("responsavel").value,
      local:               document.getElementById("local").value,
      servico_especifico:  document.getElementById("servico").value,
      qtd:                 document.getElementById("qtd").value,
      valor:               document.getElementById("valor").value,
      horimetro_atual:     document.getElementById("atual").value,
      horimetro_anterior:  document.getElementById("anterior").value,
      proxima_troca:       document.getElementById("proxima").value
    };

    if (navigator.onLine) {
      try {
        const res  = await fetch(APPS_SCRIPT_URL, {
          method:   "POST",
          redirect: "follow",
          body:     JSON.stringify(dados),
          headers:  { "Content-Type": "text/plain" }
        });
        const json = await res.json();
        if (json.status === "ok") {
          alert("✅ Registro salvo na planilha!");
          document.getElementById("form").reset();
        } else throw new Error(json.mensagem);
      } catch(err) {
        await salvarNaFila(dados);
        alert("⚠️ Salvo no celular — será sincronizado quando conectar.");
        document.getElementById("form").reset();
      }
    } else {
      await salvarNaFila(dados);
      alert("📱 Sem sinal. Salvo no celular!");
      document.getElementById("form").reset();
    }

    btn.disabled    = false;
    btn.textContent = "SALVAR";
    await atualizarStatus();
  };

  // ── Inicialização ─────────────────────────────────────────
  window.addEventListener("load", async () => {
    await abrirDB();
    await carregarListas();
    await atualizarStatus();
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(err => console.warn("SW:", err));
    }
  });

  window.addEventListener("online",  async () => { await atualizarStatus(); sincronizarFila(); });
  window.addEventListener("offline", async () => { await atualizarStatus(); });
</script>
</body>
</html>
